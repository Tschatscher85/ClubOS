services:
  postgres:
    image: postgres:16-alpine
    container_name: vereinbase-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-vereinbase_dev}
      POSTGRES_USER: ${DB_USER:-vereinbase}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-vereinbase_dev_pw}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-vereinbase} -d ${DB_NAME:-vereinbase_dev}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vereinbase-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
